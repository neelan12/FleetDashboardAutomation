
name: Fleet Dashboard Automation

on:
  schedule:
    - cron: '0 11 * * *'   # Runs daily at 4:30 PM IST (11:00 UTC)
  workflow_dispatch:       # Allow manual run from GitHub Actions tab

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install system dependencies (Tesseract OCR for captcha)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      # 4️⃣ Install required Python packages
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl pytesseract pillow
          playwright install chromium

      # 5️⃣ Ensure output folder exists
      - name: Create output folder
        run: mkdir -p Fleet_Dashboard_Files

      # 6️⃣ Run your Python script (headless Playwright)
      - name: Run Fleet Dashboard Script
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: python Automation_Github_V1.py

      # 7️⃣ Upload the output Excel as a workflow artifact
      - name: Upload Output Excel
        uses: actions/upload-artifact@v4
        with:
          name: Fleet-Dashboard-Output
          path: Fleet_Dashboard_Files/
          if-no-files-found: warn

      # 8️⃣ Upload error screenshot if script failed
      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
          if-no-files-found: ignore
