
name: Fleet Dashboard Automation

on:
  schedule:
    - cron: '30 21 * * *'   # Runs daily at 3:00 AM IST (21:30 UTC)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Xvfb + fonts for captcha rendering)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-liberation fonts-dejavu fonts-noto-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pandas openpyxl easyocr
          playwright install --with-deps chromium

      - name: Create output folder
        run: mkdir -p Fleet_Dashboard_Files

      - name: Run Fleet Dashboard Script (headed under Xvfb)
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" python Automation_Github_V1.py

      - name: Upload Output Excel
        uses: actions/upload-artifact@v4
        with:
          name: Fleet-Dashboard-Output
          path: Fleet_Dashboard_Files/
          if-no-files-found: warn

      - name: Upload Error Screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshot
          path: error_screenshot.png
          if-no-files-found: ignore

      - name: Upload Captcha Debug Images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: captcha-debug
          path: captcha_debug/
          if-no-files-found: ignore
