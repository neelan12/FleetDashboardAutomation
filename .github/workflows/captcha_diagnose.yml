name: Captcha Diagnose

on:
  push:
    branches: [main]
    paths: ['capture_captcha_samples.py']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb fonts-liberation fonts-dejavu fonts-noto-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright easyocr
          playwright install --with-deps chromium

      - name: Capture captcha samples
        env:
          LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" python capture_captcha_samples.py

      - name: Commit samples to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add captcha_samples/ || true
          git commit -m "Captcha diagnostic samples [skip ci]" || echo "nothing to commit"
          git push
